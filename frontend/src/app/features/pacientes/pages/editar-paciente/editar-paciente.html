<div class="form-container">
  <h2>Editar Paciente</h2>

  <form (ngSubmit)="actualizarPaciente()" #editForm="ngForm">
    <div class="row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" name="nombre" [(ngModel)]="paciente.nombre" required placeholder="Nombre..." />
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input type="text" name="apellido" [(ngModel)]="paciente.apellido" required placeholder="Apellido..." />
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>DNI</label>
        <input type="text" name="dni" [(ngModel)]="paciente.dni" required placeholder="Ej. 12345678" maxlength="8" />
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" name="telefono" [(ngModel)]="paciente.telefono" required placeholder="Ej. 987654321" />
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn-cancel" routerLink="/pacientes">Cancelar</button>
      <button type="submit" class="btn-save" [disabled]="!editForm.valid">Guardar Cambios</button>
    </div>
  </form>
</div>
