<div class="form-container">
  <h2>Registrar Personal Administrativo</h2>

  <form (ngSubmit)="registrar()">
    <div class="form-grid">

      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" name="usuario" [(ngModel)]="nuevoUsuario.usuario" placeholder="Ej: admin_recepcion">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="clave" [(ngModel)]="nuevoUsuario.clave" placeholder="********">
      </div>

      <div class="form-group">
        <label>Rol en la Clínica</label>
        <select name="rol" [(ngModel)]="nuevoUsuario.rol">
          <option value="Admin">Administrador</option>
          <option value="Recepcionista">Recepcionista</option>
        </select>
      </div>

    </div>

    <div class="actions">
      <button type="button" class="btn-cancel" (click)="limpiarFormulario()">Limpiar</button>
      <button type="submit" class="btn-save">Guardar Usuario</button>
    </div>
  </form>
</div>
