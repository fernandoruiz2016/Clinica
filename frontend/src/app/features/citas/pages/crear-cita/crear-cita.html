<div class="form-container">
  <h2>Registrar Nueva Cita</h2>

  <form (ngSubmit)="guardarCita()" #citaForm="ngForm">
    <div class="dropdowns">
      <div class="form-group">
        <label>Paciente</label>
        <select name="idPaciente" [(ngModel)]="nuevaCita.idPaciente" required>
          <option value="" disabled>Seleccione un paciente</option>
          @for (p of pacientes; track p.id_paciente) {
            <option [ngValue]="p.id_paciente">{{ p.nombre }} {{ p.apellido }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Médico</label>
        <select name="idMedico" [(ngModel)]="nuevaCita.idMedico" required>
          <option value="" disabled>Seleccione un médico</option>
          @for (m of medicos; track m.id_medico) {
            <option [ngValue]="m.id_medico">{{ m.nombre }} {{ m.apellido }}</option>
          }
        </select>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" name="fecha" [(ngModel)]="nuevaCita.fecha" required />
      </div>

      <div class="form-group">
        <label>Hora</label>
        <input type="time" name="hora" [(ngModel)]="nuevaCita.hora" required />
      </div>
    </div>

    <div class="payment-section">
      <h3>Información de Pago (Opcional)</h3>
      <div class="row">
        <div class="form-group">
          <label>Monto</label>
          <input type="number" name="monto" [(ngModel)]="nuevaCita.monto" placeholder="0.00" min="0" step="0.1" />
        </div>

        <div class="form-group">
          <label>Método de Pago</label>
          <select name="metodoPago" [(ngModel)]="nuevaCita.metodoPago">
            <option value="Efectivo">Efectivo</option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Transferencia">Transferencia</option>
          </select>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn-cancel" routerLink="/citas">Cancelar</button>
      <button type="submit" class="btn-save" [disabled]="!citaForm.valid">Guardar Cita</button>
    </div>
  </form>
</div>
